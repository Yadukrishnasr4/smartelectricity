<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:300px;
}
input {
    width:100%;
    margin:10px 0;
    padding:8px;
}
button {
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
fetch("http://localhost:3000/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
})
.then(res=>res.json())
.then(data=>{
localStorage.setItem("token",data.token);
alert("Login success");
window.location.href="index.html";
});
}
</script>

</body>
</html>

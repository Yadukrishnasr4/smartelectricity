<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:300px;
}
input {
    width:100%;
    margin:10px 0;
    padding:8px;
}
button {
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Signup</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Register</button>
</div>

<script>
function signup(){
fetch("http://localhost:3000/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
email:email.value,
password:password.value
})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
window.location.href="login.html";
});
}
</script>

</body>
</html>
